<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos - Frases de Messias</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

<header>
  <h1>❤️ Frases Favoritas</h1>
  <a href="index.html">← Voltar para a página inicial</a>
</header>

<main id="listaFavoritos"></main>

<script>
const favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];
const lista = document.getElementById("listaFavoritos");

if (favoritos.length === 0) {
  lista.innerHTML = "<p>Você ainda não salvou nenhuma frase.</p>";
} else {
  favoritos.forEach(frase => {
    const card = document.createElement("div");
    card.className = "frase";
    card.innerHTML = `<p>${frase}</p>`;
    lista.appendChild(card);
  });
}
</script>

</body>
</html>
