<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - Frases de Messias</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
text-align:center;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0;
font-size:16px;
}

button{
padding:12px 18px;
margin:5px;
cursor:pointer;
border:none;
border-radius:8px;
font-size:16px;
}

.salvar{
background:#2ecc71;
color:white;
}

.exportar{
background:#3498db;
color:white;
}

.frase{
background:#fafafa;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}
</style>

</head>

<body>

<div class="container">

<h1>📖 Painel - Frases de Messias</h1>

<input id="autor" placeholder="Autor">

<select id="categoria">
<option>Motivação</option>
<option>Fé</option>
<option>Amor</option>
<option>Reflexão</option>
<option>Amizade</option>
<option>Bom Dia</option>
<option>Boa Noite</option>
<option>Esperança</option>
<option>Gratidão</option>
<option>Família</option>
<option>Sucesso</option>
<option>Vida</option>
</select>

<textarea
id="texto"
rows="5"
placeholder="Digite a frase">
</textarea>

<button class="salvar" onclick="adicionarFrase()">
Adicionar Frase
</button>

<button class="exportar" onclick="exportarJSON()">
Exportar JSON
</button>

<hr>

<div id="lista"></div>

</div>

<script>

let frases =
JSON.parse(localStorage.getItem("frasesAdmin")) || [];

function atualizar(){

const lista=document.getElementById("lista");

lista.innerHTML="";

frases.forEach((f,i)=>{

lista.innerHTML+=`
<div class="frase">

<b>${f.categoria}</b><br>

${f.texto}<br>

<small>${f.autor}</small><br><br>

<button onclick="excluir(${i})">
Excluir
</button>

</div>
`;

});

}

function adicionarFrase(){

const autor=document.getElementById("autor").value;

const categoria=document.getElementById("categoria").value;

const texto=document.getElementById("texto").value;

if(texto==""){

alert("Digite uma frase.");

return;

}

frases.push({

id:Date.now(),

categoria,

autor,

texto

});

localStorage.setItem(
"frasesAdmin",
JSON.stringify(frases)
);

document.getElementById("autor").value="";
document.getElementById("texto").value="";

atualizar();

}

function excluir(i){

frases.splice(i,1);

localStorage.setItem(
"frasesAdmin",
JSON.stringify(frases)
);

atualizar();

}

function exportarJSON(){

const blob=new Blob(

[JSON.stringify(frases,null,2)],

{type:"application/json"}

);

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="frases.json";

a.click();

}

atualizar();

</script>

</body>
  </html>
