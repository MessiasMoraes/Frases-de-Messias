<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo - Frases de Messias</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<!-- LOGIN -->

<div id="loginContainer" class="login-container">

<h1>📖 Frases de Messias</h1>

<h2>Login do Administrador</h2>

<input
type="email"
id="email"
placeholder="E-mail">

<input
type="password"
id="senha"
placeholder="Senha">

<button id="btnLogin">
Entrar
</button>

</div>

<!-- PAINEL -->

<div id="painel" class="painel" style="display:none;">

<header>

<h1>Painel Administrativo</h1>

<div>

<button id="temaBtn">
🌙 Modo Escuro
</button>

<button id="btnSair">
Sair
</button>

</div>

</header>

<!-- ESTATÍSTICAS -->

<section class="estatisticas">

<div class="card">

<h2 id="totalFrases">0</h2>

<p>Frases</p>

</div>

<div class="card">

<h2 id="totalCategorias">0</h2>

<p>Categorias</p>

</div>

<div class="card">

<h2 id="totalAutores">0</h2>

<p>Autores</p>

</div>

</section>

<!-- CADASTRO -->

<section class="cadastro">

<h2>➕ Nova Frase</h2>

<input
type="text"
id="autor"
placeholder="Autor">

<select id="categoria">

<option>Motivação</option>
<option>Fé</option>
<option>Amor</option>
<option>Reflexão</option>
<option>Amizade</option>
<option>Bom Dia</option>
<option>Boa Noite</option>
<option>Esperança</option>
<option>Gratidão</option>
<option>Família</option>
<option>Sucesso</option>
<option>Vida</option>

</select>

<textarea
id="texto"
rows="5"
placeholder="Digite a frase">
</textarea>

<input
type="file"
id="imagem"
accept="image/*">

<img
id="preview"
style="display:none;max-width:250px;border-radius:12px;">

<button id="btnSalvar">
💾 Salvar Frase
</button>

</section>

<!-- PESQUISA -->

<section class="pesquisa">

<select id="filtroCategoria">

<option value="">
📂 Todas as categorias
</option>

</select>

<input
id="pesquisa"
placeholder="Pesquisar frase...">

</section>

<!-- LISTA -->

<div id="listaFrases"></div>

</div>

<!-- MODAL -->

<div id="modalEditar" class="modal">

<div class="modal-conteudo">

<h2>Editar Frase</h2>

<input
type="hidden"
id="editId">

<input
id="editAutor"
placeholder="Autor">

<select id="editCategoria">

<option>Motivação</option>
<option>Fé</option>
<option>Amor</option>
<option>Reflexão</option>
<option>Amizade</option>
<option>Bom Dia</option>
<option>Boa Noite</option>
<option>Esperança</option>
<option>Gratidão</option>
<option>Família</option>
<option>Sucesso</option>
<option>Vida</option>

</select>

<textarea
id="editTexto"
rows="6">
</textarea>

<button id="btnAtualizar">
Salvar Alterações
</button>

<button id="btnCancelar">
Cancelar
</button>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
